version: "3.8"

services:
  app:
    image: node:20
    container_name: courier_collection_app
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "5000:5000"
      - "3000:3000"
    depends_on:
      - db
    command: sleep infinity

  db:
    image: postgres:16
    container_name: courier_collection_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: courier_collection
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
