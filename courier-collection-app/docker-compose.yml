version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: collection_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: courier_collection
    ports:
      - "5432:5432"
    volumes:
      - collection_pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: collection_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/courier_collection
      JWT_SECRET: courier_secret_key_change_in_production
      PORT: 5000
      LOGISTICS_APP_URL: http://logistics_server:5001
    ports:
      - "5000:5000"
    depends_on:
      - db
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until nc -z db 5432; do sleep 1; done &&
        echo 'Database ready.' &&
        npx prisma db push --skip-generate &&
        npx prisma db seed &&
        node dist/index.js
      "

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: collection_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  collection_pgdata:
